name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions required to publish to GitHub Pages via the official actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; never cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

# Actions are pinned to major-version tags (@v4/@v5) to match ci.yml and keep
# the template low-maintenance for adopters. SHA-pin if your threat model requires it.
jobs:
  deploy:
    name: Deploy landing/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns on Pages (source = GitHub Actions) on the first run,
      # so no manual Settings → Pages toggle is needed.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload landing/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
