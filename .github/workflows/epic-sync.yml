# epic-sync.yml — Close sub-issues referenced in a PR body when that PR is
# merged into an epic/* branch. GitHub's built-in "closes #N" keyword only
# auto-closes issues on merges to the DEFAULT branch; this Action fills the
# gap for sub-PRs that target an epic branch instead of main, so issue state
# stays accurate without requiring manual intervention after each sub-PR merge.

name: Epic – Close Sub-issues on Merge

on:
  pull_request:
    types: [closed]

# Least-privilege: read the PR; write only to issues.
permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-sub-issues:
    name: Close referenced sub-issues
    # Guard: only act when the PR was actually merged (not just closed/abandoned)
    # AND its target branch is an epic/* branch.
    # This is a no-op for PRs into main or any non-epic branch.
    if: "github.event.pull_request.merged == true && startsWith(github.event.pull_request.base.ref, 'epic/')"
    runs-on: ubuntu-latest
    steps:
      - name: Close issues referenced in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body  = context.payload.pull_request.body || '';
            const prNum = context.payload.pull_request.number;
            const base  = context.payload.pull_request.base.ref;

            // Match standard closing keywords followed by #<number>.
            // Only the integer is extracted — no content from the PR body is evaluated.
            const RE = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const hits = [...body.matchAll(RE)];

            if (hits.length === 0) {
              console.log('No closing-keyword issue references found in PR body — nothing to do.');
              return;
            }

            const nums = [...new Set(hits.map(m => parseInt(m[1], 10)))];
            console.log(`Closing issue(s): ${nums.join(', ')}`);

            for (const n of nums) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                  state: 'closed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                  body: `Closed via epic PR #${prNum} merged into \`${base}\`.`,
                });
                console.log(`Closed #${n}`);
              } catch (err) {
                // Log but do not fail the job — a missing or already-closed issue
                // must not block the overall epic-merge workflow.
                console.error(`Could not close #${n}: ${err.message}`);
              }
            }

